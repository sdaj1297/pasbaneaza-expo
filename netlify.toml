[build]
  command = "npm run build:web"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  EXPO_PUBLIC_API_BASE_URL = "/api"
  NODE_VERSION = "20"
  # Expo public values are intentionally bundled into the browser app.
  SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_DATA_BACKEND,EXPO_PUBLIC_API_BASE_URL,EXPO_PUBLIC_FIREBASE_API_KEY,EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN,EXPO_PUBLIC_FIREBASE_PROJECT_ID,EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET,EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,EXPO_PUBLIC_FIREBASE_APP_ID,EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
